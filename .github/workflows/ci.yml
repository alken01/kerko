name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy Backend
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_TOKEN: ${{ secrets.KERKO_ADMIN_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ADMIN_TOKEN
          script: |
            cd ~/code/kerko
            git pull origin main
            cd backend
            docker build -t kerko-backend .
            docker stop kerko-backend || true
            docker rm kerko-backend || true
            docker run -d --name kerko-backend -p 8080:8080 \
              -v /home/ec2-user/code/kerko/backend/data:/app/data \
              -e KERKO_ADMIN_TOKEN="$ADMIN_TOKEN" \
              -e ConnectionStrings__AnalyticsConnection="Data Source=/app/data/analytics.db" \
              kerko-backend
            sleep 5
            curl -sf http://localhost:8080/api/health || (docker logs kerko-backend && exit 1)
            docker image prune -f
