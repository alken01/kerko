services:
  backend:
    container_name: kerko-backend
    image: kerko-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./data:/app/data
    networks:
      - kerko-network

networks:
  kerko-network:
    driver: bridge 